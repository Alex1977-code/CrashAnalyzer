<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crash Analyzer</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='7'%20fill='%232a78d6'/%3E%3Cpath%20d='M5%2017h6l2.5-7%204%2013%203-6h6.5'%20fill='none'%20stroke='white'%20stroke-width='2.6'%20stroke-linecap='round'%20stroke-linejoin='round'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <svg width="26" height="26" viewBox="0 0 32 32" aria-hidden="true">
        <rect width="32" height="32" rx="7" fill="var(--series-crash)"/>
        <path d="M5 17h6l2.5-7 4 13 3-6h6.5" fill="none" stroke="#fff" stroke-width="2.6"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Crash Analyzer <span class="sub" id="app-version"></span></span>
    </div>
    <nav class="tabs" role="tablist" aria-label="Bereiche">
      <button role="tab" data-tab="diagnose" aria-selected="true">Diagnose</button>
      <button role="tab" data-tab="tools" aria-selected="false">Prüftools</button>
      <button role="tab" data-tab="settings" aria-selected="false">Einstellungen</button>
    </nav>
    <div class="spacer"></div>
    <span id="admin-badge"></span>
    <button class="iconbtn" id="theme-toggle" title="Hell/Dunkel umschalten" aria-label="Farbschema umschalten">◐</button>
  </header>
  <main id="view" aria-live="polite"></main>
  <div class="viz-tooltip" id="viz-tooltip" role="tooltip"></div>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
